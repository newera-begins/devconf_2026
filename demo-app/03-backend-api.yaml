---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-api-code
  namespace: demo-app
data:
  app.py: |
    #!/usr/bin/env python3
    """Bookstore Backend API - serves book data from PostgreSQL."""
    import os
    import json
    import time
    import socket
    from http.server import HTTPServer, BaseHTTPRequestHandler
    from socketserver import ThreadingMixIn
    import traceback

    DB_HOST = os.environ.get("DB_HOST", "database")
    DB_PORT = os.environ.get("DB_PORT", "5432")
    DB_NAME = os.environ.get("DB_NAME", "bookstore")
    DB_USER = os.environ.get("DB_USER", "demo")
    DB_PASS = os.environ.get("DB_PASS", "demo123")

    def get_books():
        """Fetch books from PostgreSQL."""
        try:
            import psycopg2
            conn = psycopg2.connect(
                host=DB_HOST, port=DB_PORT,
                dbname=DB_NAME, user=DB_USER, password=DB_PASS,
                connect_timeout=2
            )
            cur = conn.cursor()
            cur.execute("SELECT id, title, author, year, description FROM books ORDER BY id")
            books = []
            for row in cur.fetchall():
                books.append({
                    "id": row[0], "title": row[1], "author": row[2],
                    "year": row[3], "description": row[4]
                })
            cur.close()
            conn.close()
            return books
        except Exception as e:
            return {"error": str(e), "traceback": traceback.format_exc()}

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/api/books":
                data = get_books()
                body = json.dumps(data, indent=2).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

            elif self.path == "/api/health":
                body = json.dumps({"status": "ok", "hostname": socket.gethostname()}).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

            elif self.path == "/api/large":
                # Returns a large payload (~50KB) - useful for testing large response handling
                data = get_books()
                if isinstance(data, list):
                    large_data = {"books": data * 50, "generated_at": time.time()}
                else:
                    large_data = data
                body = json.dumps(large_data).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

            else:
                self.send_response(404)
                body = b'{"error": "not found"}'
                self.send_header("Content-Type", "application/json")
                self.end_headers()
                self.wfile.write(body)

        def log_message(self, format, *args):
            print(f"[{time.strftime('%H:%M:%S')}] {args[0]}")

    class ThreadingHTTPServer(ThreadingMixIn, HTTPServer):
        daemon_threads = True

    if __name__ == "__main__":
        server = ThreadingHTTPServer(("0.0.0.0", 5000), Handler)
        print("Backend API listening on :5000 (threaded)")
        server.serve_forever()

  requirements.txt: |
    psycopg2-binary==2.9.9
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: demo-app
  labels:
    app: backend-api
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
        tier: backend
    spec:
      containers:
        - name: api
          image: registry.redhat.io/ubi9/python-311:latest
          command:
            - /bin/bash
            - -c
            - |
              pip install -q psycopg2-binary==2.9.9 && \
              python /app/app.py
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: DB_HOST
              value: "database"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: POSTGRES_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: app-code
              mountPath: /app
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: app-code
          configMap:
            name: backend-api-code
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: demo-app
  labels:
    app: backend-api
spec:
  selector:
    app: backend-api
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
  type: ClusterIP
